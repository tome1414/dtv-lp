<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf DTV | Thailand Visa Agency</title>
  <meta name="description" content="Golf DTV – ゴルフDTVビザ取得専門エージェント。日本語・English・中文・한국어対応。" />
  <link rel="canonical" href="https://tome1414.github.io/dtv-lp/" />
  <link rel="alternate" hreflang="ja" href="https://tome1414.github.io/dtv-lp/ja/" />
  <link rel="alternate" hreflang="en" href="https://tome1414.github.io/dtv-lp/en/" />
  <link rel="alternate" hreflang="zh" href="https://tome1414.github.io/dtv-lp/zh/" />
  <link rel="alternate" hreflang="ko" href="https://tome1414.github.io/dtv-lp/ko/" />
  <link rel="alternate" hreflang="x-default" href="https://tome1414.github.io/dtv-lp/ja/" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: linear-gradient(160deg, #051a0e 0%, #0a2e18 40%, #166534 80%, #0f4324 100%);
      font-family: 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* BG grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative; z-index: 1;
      max-width: 600px;
      width: 100%;
    }

    /* Logo */
    .logo-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 26px;
    }
    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .logo-title span {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 48px;
    }

    /* Divider */
    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      margin: 0 auto 40px;
    }

    /* Prompt */
    .prompt {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 24px;
    }

    /* Lang cards */
    .lang-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 48px;
    }
    @media (min-width: 480px) {
      .lang-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .lang-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      color: rgba(255,255,255,0.7);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .lang-card:hover {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.4);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .lang-flag { font-size: 1.8rem; line-height: 1; }
    .lang-name { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; }
    .lang-native { font-size: 0.65rem; color: rgba(255,255,255,0.35); letter-spacing: 0.05em; }

    /* Footer note */
    .footer-note {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* Fade in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .container { animation: fadeUp 0.8s ease forwards; }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-icon">⛳</div>
    <h1 class="logo-title">Golf <span>DTV</span></h1>
    <p class="logo-sub">Thailand Visa Agency</p>
    <div class="divider"></div>

    <p class="prompt">Select your language / 言語を選択</p>

    <div class="lang-grid">
      <a href="./ja/" class="lang-card">
        <span class="lang-flag">🇯🇵</span>
        <span class="lang-name">日本語</span>
        <span class="lang-native">Japanese</span>
      </a>
      <a href="./en/" class="lang-card">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-name">English</span>
        <span class="lang-native">英語</span>
      </a>
      <a href="./zh/" class="lang-card">
        <span class="lang-flag">🇨🇳</span>
        <span class="lang-name">中文</span>
        <span class="lang-native">Chinese</span>
      </a>
      <a href="./ko/" class="lang-card">
        <span class="lang-flag">🇰🇷</span>
        <span class="lang-name">한국어</span>
        <span class="lang-native">Korean</span>
      </a>
    </div>

    <p class="footer-note">© 2025 Golf DTV Thailand Visa Agency</p>
  </div>
</body>
</html>
